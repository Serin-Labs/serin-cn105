climate:
- platform: cn105
  id: hp
  name: ${friendly_name}
  icon: mdi:heat-pump
  visual:
    min_temperature: 15
    max_temperature: 31
    temperature_step:
      target_temperature: 1
      current_temperature: 0.5
  update_interval: 2s
  debounce_delay: 100ms
  remote_temperature_timeout: 30min
  # connection_bootstrap_delay: 10s
  # remote_temperature_keepalive_interval: 20s
  # installer_mode: false
  # fahrenheit_compatibility: disabled  # disabled, standard, alt

  # --- Vane Controls ---
  vertical_vane_select:
    name: Vertical Vane
    icon: mdi:swap-vertical
  horizontal_vane_select:
    name: Horizontal Vane
    icon: mdi:swap-horizontal
  # airflow_control_select:
  #   name: Airflow Control
  #   icon: mdi:air-filter

  supports:
    mode: [AUTO, COOL, HEAT, FAN_ONLY, DRY]
    fan_mode: [AUTO, QUIET, LOW, MEDIUM, MIDDLE, HIGH]
    # swing_mode: [OFF, VERTICAL, HORIZONTAL, BOTH]
    # dual_setpoint: false

