# ESPHome Firmware Release
#
# Builds ESPHome firmware for all supported boards and commits
# merged binaries to firmware/esphome/ for ESP Web Tools flashing.
#
# Triggers:
#   - Push to esphome/ configs on main
#   - Manual dispatch

name: ESPHome Firmware Release

on:
  push:
    paths:
      - 'esphome/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - config: esphome/serin_esp32s3.yaml
            name: m5atoms3lite
            chip: esp32s3
            flash_size: 8MB
          - config: esphome/serin_esp32c6.yaml
            name: nanoc6
            chip: esp32c6
            flash_size: 4MB

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ESPHome
        run: pip install esphome

      - name: Compile firmware
        env:
          CONFIG: ${{ matrix.config }}
        run: esphome compile "$CONFIG"

      - name: Find build artifacts
        id: build-dir
        env:
          CONFIG: ${{ matrix.config }}
        run: |
          # ESPHome creates .esphome/ in the config file's directory
          CONFIG_DIR=$(dirname "$CONFIG")
          BUILD_ROOT="${CONFIG_DIR}/.esphome/build"

          echo "=== All .bin files under ${BUILD_ROOT} ==="
          find "$BUILD_ROOT" -name "*.bin" -type f

          BOOTLOADER=$(find "$BUILD_ROOT" -name "bootloader.bin" -type f | head -1)
          PARTITIONS=$(find "$BUILD_ROOT" \( -name "partition-table.bin" -o -name "partitions.bin" \) -type f | head -1)
          # Try "firmware.bin" (PlatformIO) first, then device-named bin (native ESP-IDF)
          FIRMWARE=$(find "$BUILD_ROOT" -name "firmware.bin" -type f | head -1)
          if [ -z "$FIRMWARE" ]; then
            DEV_DIR=$(find "$BUILD_ROOT" -maxdepth 1 -mindepth 1 -type d | head -1)
            DEVICE_NAME=$(basename "$DEV_DIR")
            FIRMWARE=$(find "$DEV_DIR" -maxdepth 2 -name "${DEVICE_NAME}.bin" -type f | head -1)
          fi

          if [ -z "$BOOTLOADER" ] || [ -z "$PARTITIONS" ] || [ -z "$FIRMWARE" ]; then
            echo "::error::Missing build artifacts: bootloader=${BOOTLOADER} partitions=${PARTITIONS} firmware=${FIRMWARE}"
            exit 1
          fi

          echo "bootloader=${BOOTLOADER}" >> "$GITHUB_OUTPUT"
          echo "partitions=${PARTITIONS}" >> "$GITHUB_OUTPUT"
          echo "firmware=${FIRMWARE}" >> "$GITHUB_OUTPUT"
          echo "Found: bootloader=${BOOTLOADER} partitions=${PARTITIONS} firmware=${FIRMWARE}"

      - name: Create merged firmware binary
        env:
          CHIP: ${{ matrix.chip }}
          NAME: ${{ matrix.name }}
          FLASH_SIZE: ${{ matrix.flash_size }}
          BOOTLOADER: ${{ steps.build-dir.outputs.bootloader }}
          PARTITIONS: ${{ steps.build-dir.outputs.partitions }}
          FIRMWARE: ${{ steps.build-dir.outputs.firmware }}
        run: |
          esptool --chip "${CHIP}" merge-bin \
            -o "${NAME}.bin" \
            --flash-mode dio --flash-freq 80m --flash-size "${FLASH_SIZE}" \
            0x0000 "${BOOTLOADER}" \
            0x8000 "${PARTITIONS}" \
            0x10000 "${FIRMWARE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}
          path: ${{ matrix.name }}.bin

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: artifacts/

      - name: Deploy firmware files
        run: |
          rm -f firmware/esphome/*.bin
          cp artifacts/firmware-m5atoms3lite/m5atoms3lite.bin firmware/esphome/
          cp artifacts/firmware-nanoc6/nanoc6.bin firmware/esphome/

      - name: Generate manifest.json
        run: |
          cat > firmware/esphome/manifest.json << 'EOF'
          {
            "name": "Serin ESPHome",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "m5atoms3lite.bin", "offset": 0 }
                ]
              },
              {
                "chipFamily": "ESP32-C6",
                "parts": [
                  { "path": "nanoc6.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firmware/esphome/
          git diff --staged --quiet || (git commit -m "chore: update esphome firmware binaries" && git push)
